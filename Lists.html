<!--USING THE ORDER,UNORDER LISTS IN THE HTML-->

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lists Of the HTML</title>
</head>
<body>
    <h1>Order List</h1>
    <ol>
        <li>Items</li>
        <li>Mango</li>
        <li>Apple</li>
        <li>Bannana</li>
        <li>Pineapple</li>
        <li>Orange</li>
        <li>Pikle</li>
    </ol>
    <h1>UnOrder List</h1>
    <ul>
        <li>Items</li>
        <li>Mango</li>
        <li>Apple</li>
        <li>Bannana</li>
        <li>Pineapple</li>
        <li>Orange</li>
        <li>Pikle</li>

    </ul>
</body>
</html>
