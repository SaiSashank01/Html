<!doctype html>
<html lang="en">
  <head>
    <title>Form Tags</title>
  </head>
  <body>
    <form>
      <label for="NME">Name:</label>
      <input type="text" id="NME" placeholder="Enter your name" /><br />
      <label for="psw">Password:</label>
      <input type="password" id="psw" placeholder="Enter your Password" /><br />
      <label for="em">E-Mail:</label>
      <input type="email" id="em" placeholder="Enter your Email" /><br />

      <label for="sks">Skills:</label>
      <input type="checkbox" id="sks" />HTML
      <input type="checkbox" id="sks" />CSS 
      <input type="checkbox" id="sks" />JS<br>



      <label for="Rdo">Gender:</label>
      <input name="Rdo" type="radio" />Male
      <input name="Rdo" type="radio" />Female <br>

      
      <label for="selt">Choose the Branch:</label>
      <select name="selt" >
        <option>CSS</option>
        <option>AIDS</option>
        <option>AIML</option>
        <option>EEE</option>
      </select><br>
      <label for="sub"> </label>
      <input name="sub" type="submit"/>
    </form>
  </body>
</html>
